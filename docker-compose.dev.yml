services:
  card-reader-dev:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "0.0.0.0:5173:5173"
    volumes:
      - ./:/app
      - /app/node_modules
    networks:
      - card-reader-network

networks:
  card-reader-network:
    name: card-reader-network
    driver: bridge
